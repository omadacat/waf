# ─────────────────────────────────────────────────────────────────────────────
# nginx.conf — lvsci.net WAF integration
# ─────────────────────────────────────────────────────────────────────────────
#
# Topology:
#   Internet → nginx (TLS termination, first-pass filtering)
#            → WAF  (127.0.0.1:7616, challenge/ban/JA4/reputation)
#            → backend (127.0.0.1:8080)
#
# JA4 fingerprinting options (pick one — see SECTION 3):
#   A. WAF native TLS  — most accurate, nginx does TCP pass-through only
#   B. OpenResty + Lua — nginx terminates TLS, passes hash via header
#   C. No JA4 via nginx — fingerprint grouping still works via native mode
#      if you later point cert_file/key_file at the WAF config.
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # ── SECTION 1: Rate-limiting zones ───────────────────────────────────────
    # These fire before traffic reaches the WAF — cheap, kernel-level.
    # Set lower than the WAF's own limits so nginx absorbs burst floods first.

    # Per-IP request rate: 15 req/s sustained (WAF allows 45 req/min = 0.75/s
    # sustained; the burst here catches sudden floods before the WAF even sees them).
    limit_req_zone $binary_remote_addr zone=per_ip:20m    rate=15r/s;

    # Tighter zone for challenge endpoints — bots hammering /_waf/js etc.
    limit_req_zone $binary_remote_addr zone=challenge:5m  rate=2r/s;

    # Per-IP concurrent connections (stops connection-flood scrapers and
    # slowloris variants).
    limit_conn_zone $binary_remote_addr zone=conn_ip:20m;

    # ── SECTION 2: Bad-UA map (cheap nginx-level pre-filter) ─────────────────
    # This catches bots that don't even bother to spoof. The WAF's antibot
    # layer does deeper regex matching; this is just a fast exact-match pass.
    map $http_user_agent $bad_ua {
        default                     0;
        ""                          1;  # empty UA
        "~*python-requests"         1;
        "~*python-urllib"           1;
        "~*curl/"                   1;
        "~*wget/"                   1;
        "~*go-http-client"          1;
        "~*java/"                   1;
        "~*scrapy"                  1;
        "~*mechanize"               1;
        "~*GPTBot"                  1;
        "~*ChatGPT-User"            1;
        "~*CCBot"                   1;
        "~*anthropic-ai"            1;
        "~*ClaudeBot"               1;
        "~*PerplexityBot"           1;
        "~*Bytespider"              1;
        "~*AhrefsBot"               1;
        "~*SemrushBot"              1;
        "~*MJ12bot"                 1;
        "~*DotBot"                  1;
        "~*DataForSeoBot"           1;
    }

    # ── SECTION 3A: WAF native TLS (RECOMMENDED for JA4) ─────────────────────
    # In this mode nginx is not involved in TLS at all for the WAF-protected
    # vhosts. The WAF terminates TLS directly using its built-in listener,
    # which peeks the raw ClientHello and computes a full JA4 fingerprint
    # before crypto/tls ever sees the bytes.
    #
    # Setup:
    #   1. Set in /etc/waf/config.yaml:
    #        listen_addr: "0.0.0.0:443"
    #        tls:
    #          cert_file: "/etc/ssl/lvsci.net/fullchain.pem"
    #          key_file:  "/etc/ssl/lvsci.net/privkey.pem"
    #   2. Remove or comment out the HTTPS server blocks below.
    #   3. Keep the HTTP→HTTPS redirect block (port 80) — nginx still handles that.
    #   4. Keep any non-WAF vhosts in nginx as normal.
    #
    # The WAF then sees the real client TLS directly and populates its
    # reputation store with accurate JA4-based fingerprint group scores.

    # ── SECTION 3B: OpenResty + Lua JA4 (alternative) ────────────────────────
    # If you need nginx to terminate TLS (e.g. for other vhosts sharing port 443),
    # use OpenResty (drop-in nginx replacement with LuaJIT):
    #
    #   apt install openresty
    #
    # Then add to the server block:
    #
    #   access_by_lua_block {
    #       local tls = require "ngx.ssl"
    #       -- lua-resty-ja4 or equivalent Lua JA4 implementation
    #       -- ngx.req.set_header("X-JA4-Hash", ja4.fingerprint())
    #   }
    #
    # Without OpenResty, standard nginx cannot compute JA4.
    # The ngx_ssl_ja3 module is archived and computes JA3, not JA4.

    # ─────────────────────────────────────────────────────────────────────────
    # HTTP → HTTPS redirect (handled by nginx regardless of TLS mode)
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name lvsci.net *.lvsci.net;

        # ACME challenge for cert renewal (used even in native-TLS WAF mode).
        location /.well-known/acme-challenge/ {
            root /var/www/acme;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # HTTPS server block (only active when nginx terminates TLS — Section 3B)
    # Comment this out entirely if using WAF native TLS (Section 3A).
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name lvsci.net *.lvsci.net;

        # ── TLS ───────────────────────────────────────────────────────────────
        ssl_certificate     /etc/ssl/lvsci.net/fullchain.pem;
        ssl_certificate_key /etc/ssl/lvsci.net/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;

        # Prefer server cipher order for TLS 1.2; TLS 1.3 cipher selection
        # is handled by the client (and that's fine — all TLS 1.3 ciphers
        # are strong).
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;

        # Session resumption — improves perf for legit users, harmless for bots.
        ssl_session_cache   shared:SSL:50m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;  # disable tickets for forward secrecy

        # TLS 1.3 0-RTT disabled — prevents replay attacks on POST endpoints.
        ssl_early_data off;

        # Reject TLS handshakes where SNI doesn't match this server_name.
        # Catches bots that connect to the IP directly without SNI.
        ssl_reject_handshake on;

        # OCSP stapling — faster cert validation for browsers.
        ssl_stapling        on;
        ssl_stapling_verify on;
        resolver 1.1.1.1 8.8.8.8 valid=300s;

        # ── Anti-slowloris timeouts ───────────────────────────────────────────
        # Slow HTTP attacks hold connections open by trickling headers/body.
        # These cut them off before they exhaust worker connections.
        client_header_timeout  10s;
        client_body_timeout    15s;
        send_timeout           15s;
        keepalive_timeout      65s;
        keepalive_requests     200;

        # ── Connection and request limits ─────────────────────────────────────
        limit_conn conn_ip 30;         # max 30 concurrent conns per IP
        limit_req  zone=per_ip burst=60 nodelay;

        # ── Request size limits ───────────────────────────────────────────────
        client_max_body_size    10m;
        client_body_buffer_size 16k;

        # Large headers are a sign of header-injection attacks or malformed bots.
        large_client_header_buffers 4 8k;

        # ── Pre-filter: block bad UAs at nginx level ──────────────────────────
        if ($bad_ua) {
            return 403;
        }

        # ── Block common scanner/exploit paths ────────────────────────────────
        # Returning 403 (not 404) denies information about whether paths exist.
        location ~* \.(php|asp|aspx|jsp|cgi|pl|py|rb|sh|bash|env|git|svn|htaccess)$ {
            return 403;
        }
        location ~* /(wp-admin|wp-login|phpmyadmin|adminer|admin|xmlrpc\.php|\.env|\.git|\.svn|setup\.php|install\.php) {
            return 403;
        }

        # ── Challenge endpoints: tighter rate limit ────────────────────────────
        # Bots that fail the challenge retry rapidly — this throttles retries
        # before they reach the WAF's own nonce store.
        location /_waf/ {
            limit_req zone=challenge burst=10 nodelay;
            proxy_pass         http://127.0.0.1:7616;
            proxy_http_version 1.1;
            proxy_set_header   Connection       "";
            # Real-IP forwarding — see CRITICAL note below.
            proxy_set_header   X-Forwarded-For  $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Host             $host;
        }

        # ── Main proxy to WAF ─────────────────────────────────────────────────
        location / {
            proxy_pass         http://127.0.0.1:7616;
            proxy_http_version 1.1;
            proxy_set_header   Connection       "";

            # ── CRITICAL: real-IP forwarding ──────────────────────────────────
            # Use $remote_addr (the IP nginx sees), NOT $proxy_add_x_forwarded_for.
            #
            # $proxy_add_x_forwarded_for APPENDS to whatever the client sent.
            # A scraper that sends "X-Forwarded-For: 1.1.1.1" would cause the
            # WAF to see "1.1.1.1" as the client IP, bypassing all bans.
            #
            # By replacing with $remote_addr, the client's XFF is discarded and
            # only the IP nginx actually connected from is forwarded.
            proxy_set_header   X-Forwarded-For  $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Host             $host;

            # ── Pass TLS signal to WAF (nginx-termination mode) ───────────────
            # $ssl_protocol and $ssl_cipher help the WAF log TLS metadata even
            # when it's not terminating TLS itself.
            proxy_set_header   X-SSL-Protocol   $ssl_protocol;
            proxy_set_header   X-SSL-Cipher     $ssl_cipher;

            # If using OpenResty with a Lua JA4 implementation (Section 3B):
            # proxy_set_header X-JA4-Hash $ja4_fingerprint;

            # ── Proxy timeouts ────────────────────────────────────────────────
            proxy_connect_timeout  5s;
            proxy_send_timeout     30s;
            proxy_read_timeout     30s;

            # ── Security headers added by nginx ───────────────────────────────
            # These are set here rather than in the WAF to keep them on all
            # responses including 4xx error pages.
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
            add_header X-Content-Type-Options    "nosniff"                                       always;
            add_header X-Frame-Options           "SAMEORIGIN"                                    always;
            add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
            add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"      always;

            # Prevent nginx from leaking its version in error pages.
            server_tokens off;
        }
    }


    # ─────────────────────────────────────────────────────────────────────────
    # GeoIP2 datacenter ASN blocking (optional — requires ngx_http_geoip2_module
    # and MaxMind GeoLite2-ASN.mmdb, same DB used by the WAF reputation system)
    # ─────────────────────────────────────────────────────────────────────────
    #
    # Install module:
    #   apt install libnginx-mod-http-geoip2
    #
    # Uncomment and add to the http block:
    #
    # geoip2 /etc/waf/GeoLite2-ASN.mmdb {
    #     $geoip2_asn autonomous_system_number;
    # }
    #
    # map $geoip2_asn $blocked_asn {
    #     default   0;
    #     16509     1;   # Amazon AWS
    #     15169     1;   # Google Cloud
    #     8075      1;   # Microsoft Azure
    #     24940     1;   # Hetzner
    #     14061     1;   # DigitalOcean
    #     16276     1;   # OVH
    #     20473     1;   # Vultr
    #     63949     1;   # Linode/Akamai
    # }
    #
    # Then in the server block, before location /:
    #   if ($blocked_asn) { return 403; }
    #
    # CAUTION: blocking datacenter ASNs at nginx level is aggressive. It will
    # also block legitimate API clients, CI pipelines, and developer tools
    # connecting from cloud VMs. The WAF's scrypt challenge for datacenter IPs
    # is a softer alternative — it challenges rather than outright blocks.
    # Only block ASNs at nginx level if you're certain your users don't come
    # from those providers.
}
