worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    limit_req_zone $binary_remote_addr zone=per_ip:20m    rate=15r/s;
    limit_req_zone $binary_remote_addr zone=challenge:5m  rate=2r/s;
    limit_conn_zone $binary_remote_addr zone=conn_ip:20m;

    map $http_user_agent $bad_ua {
        default                     0;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name example.com;

        location /.well-known/acme-challenge/ {
            root /var/www/acme;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name example.com;
        ssl_certificate     /etc/ssl/lvsci.net/fullchain.pem;
        ssl_certificate_key /etc/ssl/lvsci.net/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_session_cache   shared:SSL:50m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_early_data off;
        ssl_reject_handshake on;
        ssl_stapling        on;
        ssl_stapling_verify on;
        resolver 1.1.1.1 8.8.8.8 valid=300s;
        client_header_timeout  10s;
        client_body_timeout    15s;
        send_timeout           15s;
        keepalive_timeout      65s;
        keepalive_requests     200;
        limit_conn conn_ip 30;         # max 30 concurrent conns per IP
        limit_req  zone=per_ip burst=60 nodelay;
        client_max_body_size    10m;
        client_body_buffer_size 16k;
        large_client_header_buffers 4 8k;
        if ($bad_ua) {
            return 403;
        }

        location ~* \.(php|asp|aspx|jsp|cgi|pl|py|rb|sh|bash|env|git|svn|htaccess)$ {
            return 403;
        }
        location ~* /(wp-admin|wp-login|phpmyadmin|adminer|admin|xmlrpc\.php|\.env|\.git|\.svn|setup\.php|install\.php) {
            return 403;
        }

        location /_waf/ {
            limit_req zone=challenge burst=10 nodelay;
            proxy_pass         http://127.0.0.1:7616;
            proxy_http_version 1.1;
            proxy_set_header   Connection       "";
            # Real-IP forwarding — see CRITICAL note below.
            proxy_set_header   X-Forwarded-For  $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Host             $host;
        }

        location / {
            proxy_pass         http://127.0.0.1:7616;
            proxy_http_version 1.1;
            proxy_set_header   Connection       "";
            proxy_set_header   X-Forwarded-For  $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Host             $host;
            proxy_set_header   X-SSL-Protocol   $ssl_protocol;
            proxy_set_header   X-SSL-Cipher     $ssl_cipher;
            proxy_connect_timeout  5s;
            proxy_send_timeout     30s;
            proxy_read_timeout     30s;
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
            add_header X-Content-Type-Options    "nosniff"                                       always;
            add_header X-Frame-Options           "SAMEORIGIN"                                    always;
            add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
            add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"      always;
            server_tokens off;
        }
    }
}
