# ============================================================
# Targets: uri | body | ua | header:Name | all_headers
# Action:  block (default) | log
# ============================================================

# SQL Injection
- id: sqli-001
  name: "SQLi - statement keyword"
  pattern: '(?i)(union[\s\/\*]+select|select[\s\/\*]+.*[\s\/\*]+from|insert[\s\/\*]+into|drop[\s\/\*]+table|delete[\s\/\*]+from|update[\s\/\*]+.*[\s\/\*]+set|exec[\s]*\(|execute[\s]*\()'
  targets: [uri, body]
  action: block
  tag: sqli
  message: "SQL injection - statement keyword"

- id: sqli-002
  name: "SQLi - tautology / comment"
  pattern: "(?i)('\\s*or\\s+'|'\\s*or\\s+1|\"\\s*or\\s+\"|'\\s*or\\s*'1'='1|--\\s*$|;\\s*drop|;\\s*select)"
  targets: [uri]
  action: block
  tag: sqli
  message: "SQL injection - tautology or comment"

- id: sqli-003
  name: "SQLi - UNION SELECT"
  pattern: '(?i)(union\s+select|union\s+all\s+select)'
  targets: [uri, body]
  action: block
  tag: sqli
  message: "SQL injection - UNION SELECT"

- id: sqli-004
  name: "SQLi - stacked queries"
  pattern: '(?i)(;\s*(select|insert|update|delete|drop|alter|create))'
  targets: [uri]
  action: block
  tag: sqli
  message: "SQL injection - stacked query"

# Cross‑Site Scripting 
- id: xss-001
  name: "XSS - script/event handler"
  pattern: '(?i)(<[\s]*script[\s/>]|javascript[\s]*:|on\w+[\s]*=[\s]*["\x27]?[^"\x27\s>]+|<[\s]*iframe[\s/>]|<[\s]*object[\s/>]|<[\s]*embed[\s/>])'
  targets: [uri, body, all_headers]
  action: block
  tag: xss
  message: "XSS - script or event handler"

- id: xss-002
  name: "XSS - alternative vectors"
  pattern: '(?i)(vbscript[\s]*:|data[\s]*:[\s]*text\/html|<[\s]*svg[\s/>].*on\w+)'
  targets: [uri, body]
  action: block
  tag: xss
  message: "XSS - alternative vector"

- id: xss-003
  name: "XSS - script tag"
  pattern: '(?i)<\s*script[^>]*>'
  targets: [uri, body, all_headers]
  action: block
  tag: xss
  message: "XSS - script tag"

- id: xss-004
  name: "XSS - javascript: URI"
  pattern: '(?i)javascript\s*:'
  targets: [uri, body, all_headers]
  action: block
  tag: xss
  message: "XSS - javascript: URI"

# Path Traversal
- id: traversal-001
  name: "Path traversal - dot-dot-slash"
  pattern: '(\.\.[\/\\]|%2e%2e[\/\\%]|%252e%252e|\.\.\%2f|\.\.\%5c)'
  targets: [uri]
  action: block
  tag: traversal
  message: "Path traversal"

- id: traversal-002
  name: "Path traversal - sensitive files"
  pattern: '(?i)(\/etc\/passwd|\/etc\/shadow|\/proc\/self\/environ|\/windows\/system32|\/boot\.ini|\/wp-config\.php)'
  targets: [uri]
  action: block
  tag: traversal
  message: "Sensitive file access"

# Command Injection 
- id: cmdi-001
  name: "Command injection - shell metacharacters"
  pattern: "(?i)([;|`]\\s*(cat|ls|id|whoami|uname|wget|curl|bash|sh\\b|cmd\\.exe|powershell)\\b|\\$\\([^)]+\\)|`[^`]+`)"
  targets: [uri, body]
  action: block
  tag: cmdi
  message: "Command injection"

# SSRF
- id: ssrf-001
  name: "SSRF - internal addresses"
  pattern: '(?i)(localhost|127\.0\.0\.1|169\.254\.|::1|0\.0\.0\.0|metadata\.google\.internal)'
  targets: [uri]
  action: block
  tag: ssrf
  message: "SSRF internal address"

# LFI / PHP wrappers 
- id: lfi-001
  name: "LFI - PHP stream wrappers"
  pattern: '(?i)(php:\/\/filter|php:\/\/input|data:\/\/|expect:\/\/|zip:\/\/|phar:\/\/)'
  targets: [uri]
  action: block
  tag: lfi
  message: "LFI - PHP stream wrapper"

# XXE 
- id: xxe-001
  name: "XXE - XML external entity"
  pattern: '(?i)(<!entity|<!doctype.*system|SYSTEM\s+["'']http)'
  targets: [uri, body]
  action: block
  tag: xxe
  message: "XXE attempt"

# Security scanners (User‑Agent)
- id: scanner-001
  name: "Suspicious UA - scanner tools"
  pattern: '(?i)(nikto|sqlmap|nmap|masscan|nuclei|dirbuster|gobuster|ffuf|wfuzz|acunetix|nessus|openvas|hydra|burpsuite)'
  targets: [ua]
  action: block
  tag: scanner
  message: "Security scanner ua"

