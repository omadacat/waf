# ============================================================
# WAF production config
# Env overrides: WAF_LISTEN_ADDR, WAF_TOKEN_SECRET
# Generate a new secret: openssl rand -hex 32
# ============================================================

listen_addr: "127.0.0.1:7616"

token_secret: "CHANGE_ME" # generate with: openssl rand -hex 32
token_ttl: "30m"

backends:
  # "example.com":         "http://127.0.0.1:4000"

rate_limit:
  enabled: true
  window_seconds: 60
  max_requests: 100
  # Short duration = false positives recover quickly.
  # Repeat offenders are escalated by the reputation system.
  blacklist_duration: "2h"

# Paths matching a "challenge: none" policy rule are exempt from these checks.
# Non-browser service clients (ActivityPub servers, sync clients, feed readers)
# legitimately lack browser headers and must not be blocked here.
antibot:
  enabled: true
  block_empty_user_agent: true
  block_empty_accept: true
  bot_ua_list_file: "/etc/waf/bad_bots.txt"
  # How to handle search engine crawlers (Googlebot, Bingbot, etc.):
  #   challenge   - same PoW as everyone else (default)
  #   permissive  - verified crawlers skip challenges (still rate-limited)
  #   strict      - block all crawlers outright (no SEO needed)
  crawler_policy: "challenge"

# Requires nginx to set: proxy_set_header X-JA4-Hash $ja4_hash; (needs OpenResty + Lua JA4 module)
ja3:
  enabled: true
  blocklist_file: "/etc/waf/blocklist.txt"
  ban_duration: "4h"

# Each signal fires AT MOST ONCE per window. The metronomic check requires
# mean inter-request gap > 200ms to avoid false positives from browser HTTP/2
# parallel asset loading (near-zero mean gap, looks metronomic but isn't).
scraper:
  enabled: true
  window: "2m"
  min_requests: 15 # nav requests before ratio signal evaluates
  unique_path_ratio_soft: 0.75 # +25 (once per window)
  unique_path_ratio_hard: 0.92 # +50 (once per window)
  seq_run_length: 5 # +40 — /item/41,42,43,44,45 (once per window)
  metronome_jitter_ms: 50 # +30 — stddev < 50ms AND mean > 200ms (once)
  challenge_threshold: 80 # needs 2+ signals to trigger
  ban_threshold: 180 # needs a sustained multi-signal pattern
  ban_duration: "4h"

challenges:
  base_path: "/_waf"
  nonce_ttl: "5m"
  strategy: "js_first" # js_first | css_first | scrypt_for_datacenter
  js_difficulty: 16 # ~65 536 hashes ≈ 0.1s in a modern browser
  scrypt_difficulty: 20
  scrypt_n: 32768 # memory cost = N × r × 128 B = 4 MB
  scrypt_r: 8
  scrypt_p: 1
  scrypt_key_len: 32
  css_sequence_length: 3
  exempt_paths:
    - "/_waf/"
    - "/favicon.ico"
    - "/.well-known/"
  exempt_hosts: []
    # - "media.example.com"
  tor_friendly: true
  tor_exit_list_url: "https://check.torproject.org/torbulkexitlist"
  tor_exit_refresh: "6h"
  tor_js_difficulty: 10
  tor_scrypt_difficulty: 14
  # template_dir: "/etc/waf/templates"  # uncomment to override embedded HTML

bans:
  enabled: true
  persist_file: "/var/log/waf/bans.json"
  fail2ban_log: "/var/log/waf/fail2ban.log"
  default_ban_duration: "1h"
  score_threshold: 50

waf:
  enabled: true
  engine: "regex"
  regex:
    rules_file: "/etc/waf/waf_rules.yaml" # falls back to built-ins if missing
  log_blocks: true
  # Disable body inspection for media streaming hosts.
  # Rate limiting and challenge layers still apply.
  skip_hosts: []
    # - "media.example.com"

reputation:
  enabled: true
  persist_file: "/var/log/waf/reputation.json"
  # Fraction of an IP penalty propagated to each group.
  # JA4 fingerprint = strongest (same TLS stack = same bot fleet).
  subnet_propagation: 0.25
  fingerprint_propagation: 0.50
  asn_propagation: 0.08
  challenge_threshold: 50 # group score → escalate to scrypt
  ban_threshold: 80 # group score → pre-emptive ban
  ban_duration: "4h"
  half_life: "6h"

# Bypasses ALL layers: challenges, WAF rules, rate limits, reputation.
# Add your own IPs, monitoring probes, CDN health-check ranges.
allowlist:
  enabled: false
  cidrs: []
  # cidrs:
  #   - "1.2.3.4"       # home / office
  #   - "10.0.0.0/8"    # internal network

# First request from any new IP fires a background DNS lookup.
# Results cached 4h and fed to the reputation store as a penalty.
# Disabled by default — enable once comfortable with Spamhaus query volume.
dnsbl:
  enabled: false
  zones: [] # empty = defaults: zen.spamhaus.org, dnsbl.dronebl.org
  ttl: "4h"
  penalty: 30

# Evaluated in order — first match wins.
# "challenge: none" disables PoW/CSS challenge AND antibot header checks for
# that path. Non-browser clients on these paths will never be blocked for
# lacking browser headers.
#
# Add  hosts: ["your.host"]  to scope a rule to one domain.
# Omit hosts to apply to all domains.
policies:
  # Fediverse
  # Remote servers send Accept: application/activity+json, not text/html.
  # Blocking them breaks federation: no follows, boosts, replies, or likes
  # from users on other instances will work.
  - name: "activitypub federation"
    paths:
      - "/.well-known/webfinger"
      - "/.well-known/nodeinfo"
      - "/.well-known/host-meta"
      - "/nodeinfo"
      - "/users/"
      - "/inbox"
      - "/outbox"
      - "/followers"
      - "/following"
      - "/notes/"
      - "/objects/"
      - "/activities/"
      - "/actor"
    challenge: none

  - name: "activitypub oauth and apps"
    paths:
      - "/oauth/"
      - "/api/v1/"
      - "/api/v2/"
    challenge: none

  # RSS Feed Feed readers (Miniflux, Feedly, self-hosted) poll on a schedule with no
  # browser Accept header. They cannot solve a JS challenge.
  - name: "rss and atom feeds"
    paths:
      - "/feed"
      - "/feed.xml"
      - "/feed.rss"
      - "/feed.atom"
      - "/rss"
      - "/rss.xml"
      - "/atom.xml"
      - "/index.xml"
      - "/feeds/"
    challenge: none

  # Desktop sync client = Go HTTP (blocked by default UA pattern).
  # Mobile = OkHttp (also blocked). WebDAV carries large binary payloads so
  # skip_waf: true avoids buffering file uploads through the inspection engine.
  - name: "nextcloud webdav and sync"
    paths:
      - "/remote.php/dav"
      - "/remote.php/webdav"
      - "/remote.php/caldav"
      - "/remote.php/carddav"
      - "/remote.php/"
      - "/public.php"
      - "/ocs/"
      - "/status.php"
    challenge: none
    skip_waf: true

  - name: "nextcloud login and apps"
    paths:
      - "/apps/"
      - "/login"
      - "/csrftoken"
      - "/index.php/login"
      - "/index.php/apps/"
    challenge: none

  # Media apps (Infuse, Swiftfin, Jellyfin Android) call the API directly.
  # Video/audio streams are large binary — skip WAF body inspection.
  - name: "jellyfin api and media"
    paths:
      - "/Users/"
      - "/System/"
      - "/Items/"
      - "/Sessions/"
      - "/Library/"
      - "/Playback/"
      - "/Videos/"
      - "/Audio/"
      - "/Playlists/"
      - "/Collections/"
      - "/web/index.html"
      - "/socket"
    challenge: none
    skip_waf: true

  # Git HTTP smart protocol sends binary pack files (large pushes/clones).
  # API used by CI, IDE integrations, release tooling.
  - name: "gitea git protocol"
    # hosts: ["git.example.com"]
    paths:
      - "/info/refs"
      - "/git-upload-pack"
      - "/git-receive-pack"
    challenge: none
    skip_waf: true

  - name: "gitea api and oauth"
    # hosts: ["git.example.com"]
    paths:
      - "/api/v1/"
      - "/api/swagger"
      - "/login/oauth/"
    challenge: none

  - name: "well-known and health"
    paths:
      - "/robots.txt"
      - "/sitemap.xml"
      - "/security.txt"
      - "/health"
      - "/healthz"
      - "/ping"
    challenge: none

logging:
  format: "json"
  level: "info"
  output: "/var/log/waf/waf.log"
  log_all_requests: false

metrics:
  enabled: true
  listen_addr: "127.0.0.1:9101"
