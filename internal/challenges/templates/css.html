<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#328c60">
<meta name="robots" content="noindex,nofollow">
<meta http-equiv="refresh" content="5.5; url={{.DoneURL}}">
<link rel="icon" href="/favicon.ico">
<title>Checking your browser — {{.Host}}</title>
<style>
*{margin:0;padding:0}
html{width:100%;background:#fff;color:#000;font-family:"Noto Serif","Source Serif",Times New Roman,Times,serif;line-height:1.75}
body,html{min-height:100vh}
body{display:flex;margin:0 auto;max-width:83vw;flex-wrap:wrap;flex-direction:column;justify-content:space-between}
header{margin:10vh 0 0;padding-bottom:1em;border-bottom:5px solid #328c60}
header a{font-size:1.5em;font-weight:bold;color:#000;text-decoration:none}
main{background:#f8faf9;border-radius:8px;box-shadow:0 2px 8px rgba(50,140,96,.1);padding:2.5rem;margin-top:2rem;margin-bottom:2rem;display:flex;flex-direction:row;gap:2rem;align-items:flex-start}
.main-text{flex:1}
.mascot{width:96px;height:96px;flex-shrink:0;image-rendering:pixelated;align-self:center}
main h1{font-size:2rem;color:#2d7353;line-height:1.3;border-bottom:2px solid #e0efe8;padding-bottom:1rem;margin-bottom:1.5rem}
main h1 em{color:#4a9b78;font-size:1rem;font-style:normal}
main p{margin:1.2rem 0;color:#3a3a3a;line-height:1.8}
a{transition:all .2s ease;color:#36c;text-decoration:none}
main a{border-bottom:1px dashed rgba(54,204,204,.3)}
a:hover{color:#2a8a5c;border-bottom-style:solid}
em,footer{color:#777;font-style:normal}
footer{margin:0 0 10vh;padding-top:1em;border-top:1px solid #eaecf0;font-size:.9em}
.footer-links a{margin-right:.5em;white-space:nowrap}

/* ── CSS WAF animation ────────────────────────────────────────────────────── */
/* .csswaf-hidden is the container. The actual animation runs on its ::before  */
/* pseudo-element — content:url() is spec-compliant and reliable on ::before  */
/* but non-standard on regular block elements.                                  */
.csswaf-hidden{position:absolute;top:0;left:0;width:1px;height:1px;overflow:hidden}
.csswaf-hidden::before{content:'';display:block;width:1px;height:1px;animation:csswaf 4s linear infinite}

/* Honeypot <a> elements — hidden from users, visible to CSS-unaware crawlers */
.hpa{display:none;width:0;height:0;position:absolute;top:-9898px;left:-9898px}

{{.KeyframeCSS}}
{{.HoneypotCSS}}

@media(max-width:768px){main{padding:1.5rem;flex-direction:column}main h1{font-size:1.6rem}.mascot{width:64px;height:64px}}
@media(prefers-color-scheme:dark){html{background:#121212;color:#e0e0e0}header{border-bottom-color:#2d7353}header a{color:#e0e0e0}main{background:#1e1e1e;box-shadow:0 2px 8px rgba(0,0,0,.5)}main h1{color:#6bc29a;border-bottom-color:#2d3833}main h1 em{color:#8fd4b0}main p{color:#ccc}a{color:#66b3ff}main a{border-bottom-color:rgba(102,179,255,.3)}a:hover{color:#6bc29a}em,footer{color:#aaa}footer{border-top-color:#333}}
</style>
</head>
<body>
<header><a href="/">{{.Host}}</a></header>
<div class="hpot" aria-hidden="true"></div>
<div class="csswaf-hidden" aria-hidden="true"></div>
{{.HoneypotLinks}}
<main>
  <img class="mascot" src="{{.BasePath}}/static/img/neofox_comfy.png" alt="" aria-hidden="true">
  <div class="main-text">
    <h1>Just a moment… <em>(no-JS)</em></h1>
    <p>Verifying your browser without JavaScript. This completes automatically in ~5 seconds.</p>
    <p>If you are not redirected, <a href="{{.DoneURL}}">click here to continue</a>.</p>
    {{.HoneypotImgs}}
  </div>
</main>
<footer>
  <div class="footer-links">
    <a href="/">Home</a>
    <a href="https://git.omada.cafe/atf/waf" rel="noopener">WAF</a>
  </div>
</footer>
</body>
</html>
