listen_addr: "127.0.0.1:7616"
token_secret: "CHANGE_ME_USE_WAF_TOKEN_SECRET_ENV_VAR_OR_openssl rand -hex 32"
token_ttl: "1h"
backends:
  "example.com": "http://127.0.0.1:8080"
rate_limit:
  enabled: true
  window_seconds: 60
  max_requests: 100
  blacklist_duration: "1h"
antibot:
  enabled: true
  block_empty_user_agent: true
  block_empty_accept: true
  bot_ua_list_file: "/etc/waf/bad_bots.txt"
challenges:
  base_path: "/_waf"
  nonce_ttl: "5m"
  strategy: "js_first" # js_first | css_first | scrypt_for_datacenter
  js_difficulty: 16 # ~65k hashes ≈ 0.1s in a modern browser
  scrypt_difficulty: 20
  scrypt_n: 32768
  scrypt_r: 8
  scrypt_p: 1
  scrypt_key_len: 32
  css_sequence_length: 3
  exempt_paths:
    - "/_waf/"
    - "/favicon.ico"
    - "/.well-known/"
  exempt_hosts: []
  tor_friendly: true
  tor_exit_list_url: "https://check.torproject.org/torbulkexitlist"
  tor_exit_refresh: "6h"
  tor_js_difficulty: 10
  tor_scrypt_difficulty: 14
# Generate hashes with: htpasswd -nbB username password or in Go: bcrypt.GenerateFromPassword([]byte(password), bcrypt.DefaultCost)
auth:
  enabled: false
  realm: "Restricted Area"
  users:
    # admin: "$2a$10$replaceWithRealBcryptHash"
  paths:
    # "/admin":   ["admin"]
bans:
  enabled: false
  persist_file: "/var/lib/waf/bans.json"
  fail2ban_log: "/var/log/waf/fail2ban.log"
  default_ban_duration: "1h"
  score_threshold: 50
waf:
  enabled: true
  engine: "regex"
  regex:
    rules_file: "/etc/waf/waf_rules.yaml"
  log_blocks: true
  # Skip WAF body inspection for media streaming (still rate-limited + antibot)
  skip_hosts:
    - "media.lvsci.net"
    - "media.omada.cat"
logging:
  format: "json" # json | text
  level: "info" # debug | info | warn | error
  output: "-" # "-" = stdout → journald
  log_all_requests: false
metrics:
  enabled: true
  listen_addr: "127.0.0.1:9101"
